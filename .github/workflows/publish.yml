name: Publish iCal Files

on:
  push:
    branches: [main]
    paths:
      - "calendar/events.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new run starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install icalendar

      - name: Generate .ics files
        run: python generate_ical.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: calendar/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
