name: Scrape Course PDFs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get install -y tesseract-ocr tesseract-ocr-deu
          pip install -r requirements.txt pymupdf pytesseract Pillow

      - name: Run scraper
        # exit 1 means "changes detected" — not a failure.
        # set +e prevents bash from aborting on exit 1 so we can capture it.
        run: |
          set +e
          python scrape.py

      - name: Extract OCR text from PDFs
        run: python pdf_ocr.py --output-dir ocr

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ manifest.json ocr/
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: update course plan PDFs and OCR results [skip ci]"
          git push origin HEAD
