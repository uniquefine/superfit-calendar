name: Scrape Course PDFs

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        id: scrape
        # exit 1 means "changes detected" — not a failure.
        # set +e prevents bash from aborting on exit 1 so we can capture it.
        run: |
          set +e
          python scrape.py
          echo "changed=$?" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.scrape.outputs.changed == '1'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ manifest.json
          git commit -m "chore: update course plan PDFs [skip ci]"
          git push origin HEAD

      - name: Trigger generate workflow
        if: steps.scrape.outputs.changed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'generate.yml',
              ref: 'main',
            });

      - name: No changes detected
        if: steps.scrape.outputs.changed != '1'
        run: echo "No changes detected, skipping commit."
