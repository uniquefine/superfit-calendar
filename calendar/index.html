<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superfit Calendar</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 640px;
      margin: 48px auto;
      padding: 0 24px;
      color: #111;
      background: #fff;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 32px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    li:last-child { border-bottom: none; }
    .course-name { flex: 1; font-weight: 500; }
    .btn {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      text-decoration: none;
      background: #111;
      color: #fff;
      white-space: nowrap;
    }
    .btn-secondary {
      background: #fff;
      color: #111;
      border: 1px solid #ccc;
    }
    .count { font-size: 0.8rem; color: #888; white-space: nowrap; }
    footer { margin-top: 40px; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>Superfit Calendar</h1>
  <p class="subtitle">Subscribe to course schedules for Superfit Berlin studios.</p>
  <ul>
        <li>
          <span class="course-name">Body Attack</span>
          <a class="btn" href="body-attack.ics" download>Download .ics</a>
          <a class="btn btn-secondary" href="body-attack.ics">Subscribe</a>
          <span class="count">2 events</span>
        </li>
        <li>
          <span class="course-name">Body Pump</span>
          <a class="btn" href="body-pump.ics" download>Download .ics</a>
          <a class="btn btn-secondary" href="body-pump.ics">Subscribe</a>
          <span class="count">1 event</span>
        </li>
  </ul>
  <footer>Updated automatically · <a href="https://github.com/uniquefine/superfit-calendar">GitHub</a></footer>
</body>
</html>
